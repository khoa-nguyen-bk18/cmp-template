appId: com.devindie.cmptemplate
name: Browse scroll to top FAB
tags:
  - android
  - regression
---
- runFlow:
    file: ../../subflows/_browse_setup.yaml
- repeat:
    times: 4
    commands:
      - scroll
- extendedWaitUntil:
    visible: "Scroll to top"
    timeout: 5000
- tapOn: "Scroll to top"
- waitForAnimationToEnd
- assertVisible: "Search inventory"
