config:
  validation: true

complexity:
  LongMethod:
    active: true
    allowedLines: 80
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 9

style:
  MaxLineLength:
    active: true
    maxLineLength: 120
  MagicNumber:
    active: true
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
