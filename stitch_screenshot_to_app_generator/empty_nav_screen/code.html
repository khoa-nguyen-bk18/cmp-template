<!-- Spacer for Bottom Navigation -->
<div class="h-20 w-full"></div>
<script>
        // Simple micro-interaction for navigation items
        document.querySelectorAll('nav a').forEach(item => {
            item.addEventListener('click', (e) => {
                // Clear active states
                document.querySelectorAll('nav a').forEach(nav => {
                    nav.className = "flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant p-2 hover:bg-surface-container dark:hover:bg-surface-container scale-95 active:scale-90 transition-transform";
                    const icon = nav.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                
                // Set active state to clicked item
                item.className = "flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary-container text-on-secondary-container dark:text-on-secondary-container rounded-lg p-2 scale-95 active:scale-90 transition-transform";
                const activeIcon = item.querySelector('.material-symbols-outlined');
                if (activeIcon) activeIcon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
